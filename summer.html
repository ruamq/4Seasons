<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Da Nang 2025</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;700;900&family=Press+Start+2P&display=swap');

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'Nunito',sans-serif;
      overflow:hidden;
      width:100vw; height:100vh;
    }

    .scene {
      position:relative;
      width:100vw; height:100vh;
      overflow:hidden;
    }

    /* ══════════════ SKY ══════════════ */
    .sky {
      position:absolute; inset:0;
      background:linear-gradient(to bottom,
        #2fa8d8 0%, #5ecbee 30%, #a8dff7 60%, #fde8b0 85%, #f9c96e 100%);
      z-index:0;
    }

    /* ══════════════ SUN ══════════════ */
    .sun {
      position:absolute; top:6%; left:7%;
      width:88px; height:88px;
      background:radial-gradient(circle at 38% 38%, #fffbe0 25%, #ffe566 55%, #ffb400 100%);
      border-radius:50%;
      box-shadow:0 0 0 12px #ffd70022, 0 0 0 28px #ffd70011,
                 0 0 60px 20px #ffcc0066, 0 0 120px 50px #ffaa0033;
      z-index:2;
      animation:sun-pulse 5s ease-in-out infinite alternate;
    }
    @keyframes sun-pulse {
      from { box-shadow:0 0 0 12px #ffd70022,0 0 0 28px #ffd70011,0 0 60px 20px #ffcc0055,0 0 120px 50px #ffaa0022; }
      to   { box-shadow:0 0 0 18px #ffd70033,0 0 0 38px #ffd70018,0 0 80px 30px #ffcc0099,0 0 160px 70px #ffaa0044; }
    }
    /* ray lines */
    .sun-rays {
      position:absolute; top:6%; left:7%;
      width:88px; height:88px;
      z-index:1;
      animation:ray-spin 12s linear infinite;
    }
    .sun-rays::before,.sun-rays::after {
      content:'';
      position:absolute; top:50%; left:50%;
      width:200px; height:2px;
      background:linear-gradient(to right,transparent,#ffd70055,transparent);
      transform-origin:left center;
      transform:translateY(-50%);
    }
    .sun-rays::after { transform:translateY(-50%) rotate(45deg); }
    @keyframes ray-spin { to { transform:rotate(360deg); } }

    /* ══════════════ CLOUDS ══════════════ */
    .cloud {
      position:absolute; z-index:1;
      background:#ffffffdd; border-radius:60px;
      animation:cloud-drift linear infinite;
    }
    .cloud::before,.cloud::after {
      content:''; position:absolute;
      background:#ffffffdd; border-radius:50%;
    }
    .c1{width:120px;height:36px;top:10%;left:18%;animation-duration:70s;}
    .c1::before{width:64px;height:64px;top:-32px;left:16px;}
    .c1::after{width:48px;height:48px;top:-22px;left:58px;}
    .c2{width:160px;height:42px;top:17%;left:52%;animation-duration:90s;animation-delay:-25s;}
    .c2::before{width:72px;height:72px;top:-36px;left:24px;}
    .c2::after{width:56px;height:56px;top:-26px;left:85px;}
    .c3{width:90px;height:28px;top:7%;left:72%;animation-duration:55s;animation-delay:-12s;}
    .c3::before{width:48px;height:48px;top:-24px;left:12px;}
    .c3::after{width:36px;height:36px;top:-16px;left:48px;}
    @keyframes cloud-drift{from{transform:translateX(-250px)}to{transform:translateX(110vw)}}

    /* ══════════════ CITY (3 depth layers) ══════════════ */
    .city-back,.city-mid,.city-front {
      position:absolute;
      left:0; right:0;
      z-index:3;
    }
    .city-back  { bottom:42%; height:200px; opacity:0.55; filter:blur(1.5px); }
    .city-mid   { bottom:40%; height:220px; opacity:0.80; }
    .city-front { bottom:38%; height:180px; opacity:1.00; }
    .city-back svg,.city-mid svg,.city-front svg { width:100%; height:100%; display:block; }

    /* ══════════════ SEA ══════════════ */
    .sea {
      position:absolute; bottom:22%; left:0; right:0; height:26%;
      background:linear-gradient(to bottom,#3ab5e0 0%,#1a7ab8 50%,#0d5590 100%);
      z-index:4;
    }
    .sea::before {
      content:''; position:absolute; inset:0;
      background:repeating-linear-gradient(
        180deg, transparent 0, transparent 16px,
        #ffffff12 16px, #ffffff12 18px
      );
      animation:shimmer 2.5s linear infinite;
    }
    /* sparkle glints */
    .sea::after {
      content:''; position:absolute; inset:0;
      background:radial-gradient(ellipse 4px 2px at 20% 30%, #ffffffaa, transparent),
                 radial-gradient(ellipse 3px 1px at 50% 60%, #ffffffaa, transparent),
                 radial-gradient(ellipse 5px 2px at 75% 40%, #ffffffaa, transparent),
                 radial-gradient(ellipse 3px 1px at 88% 70%, #ffffffaa, transparent);
      animation:sparkle 3s ease-in-out infinite alternate;
    }
    @keyframes shimmer{from{background-position:0 0}to{background-position:0 36px}}
    @keyframes sparkle{from{opacity:0.4}to{opacity:1}}

    /* ══════════════ WAVES ══════════════ */
    .waves {
      position:absolute; bottom:21%; left:0; right:0;
      height:70px; z-index:5; overflow:hidden;
    }
    .wave-svg { position:absolute; bottom:0; width:200%; height:100%; }
    .wave-1{animation:wave-move 4.5s linear infinite;opacity:1;}
    .wave-2{animation:wave-move 6.5s linear infinite reverse;opacity:0.55;top:10px;}
    .wave-3{animation:wave-move 8s linear infinite;opacity:0.35;top:18px;}
    @keyframes wave-move{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    /* ══════════════ BEACH ══════════════ */
    .beach {
      position:absolute; bottom:0; left:0; right:0; height:23%;
      background:linear-gradient(to bottom,#f7e4a8 0%,#eec95a 55%,#d8ae3a 100%);
      border-top:3px solid #e8c258;
      z-index:6;
    }
    .beach::before {
      content:''; position:absolute; inset:0;
      background-image:
        radial-gradient(circle,#b8900840 1px,transparent 1px),
        radial-gradient(circle,#a8780830 1px,transparent 1px);
      background-size:20px 14px, 13px 9px;
      background-position:0 0, 10px 7px;
    }
    /* wet sand edge */
    .beach::after {
      content:''; position:absolute; top:0; left:0; right:0; height:12px;
      background:linear-gradient(to bottom,#c8d8e8aa,transparent);
    }

    /* ══════════════ BENCH ══════════════ */
    .bench {
      position:absolute; bottom:22%; right:22%;
      z-index:9; transform:translateY(28px);
    }

    /* ══════════════ PALMS ══════════════ */
    .palm { position:absolute; bottom:22%; z-index:8; }
    .palm-left  { right:9%;  transform:scaleX(-1); }
    .palm-right { right:3%; }

    /* ══════════════ BILLBOARD ══════════════ */
    /* Big commercial billboard: tall post, orange/red frame, image panel */
    .billboard {
      position:absolute;
      bottom:22%; /* sits on beach line */
      left:5%;
      z-index:10;
      transform:translateY(0);
      display:flex;
      flex-direction:column;
      align-items:center;
    }
    /* The actual sign face */
    .bb-face {
      position:relative;
      width:640px; height:360px;
    }
    /* Orange outer frame */
    .bb-frame {
      position:absolute; inset:0;
      background:linear-gradient(135deg,#ff6a00,#ee0979);
      border-radius:6px;
      box-shadow:0 8px 30px #00000055, 4px 4px 0 #aa0000;
    }
    /* White inner mat */
    .bb-mat {
      position:absolute;
      inset:10px;
      background:#fff8f0;
      border-radius:4px;
      overflow:hidden;
    }
    .bb-mat img {
      position:relative; z-index:2; /* stay above placeholder */
      width:100%; height:100%; object-fit:cover;
    }
    .bb-mat .bb-placeholder {
      position:relative; z-index:2; /* stay above fireworks */
      width:100%; height:100%;
      background:rgba(26,26,46,0.8);
      display:flex; align-items:center; justify-content:center;
      color:#ffaa00;
      font-size:10px; font-weight:700; text-align:center;
      padding:6px; line-height:1.7;
      font-family:'Nunito',sans-serif;
    }
    /* Scan-line gloss effect */
    .bb-mat::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(160deg,#ffffff22 0%,transparent 50%);
      pointer-events:none;
    }
    /* Top header strip */
    .bb-header {
      position:absolute;
      top:0; left:0; right:0; height:26px;
      background:linear-gradient(90deg,#cc0000,#ff4400,#cc0000);
      display:flex; align-items:center; justify-content:center;
      font-size:11px; font-weight:900; letter-spacing:3px; color:#fff;
      font-family:'Nunito',sans-serif;
      text-shadow:0 1px 2px #00000088;
      z-index:1;
    }
    /* Legs / post structure */
    .bb-legs {
      display:flex; gap:360px;
      position:relative;
    }
    .bb-leg {
      width:16px;
      height:130px;
      background:linear-gradient(to right,#888,#bbb,#888);
      border-radius:4px;
      box-shadow:2px 0 4px #00000033;
    }
    /* Cross beam */
    .bb-beam {
      position:absolute;
      top:24px; left:4px; right:4px; height:8px;
      background:linear-gradient(to bottom,#aaa,#777);
      border-radius:2px;
    }
    /* Catwalk / ledge under sign */
    .bb-ledge {
      width:660px; height:12px;
      background:linear-gradient(to bottom,#999,#666);
      border-radius:3px 3px 0 0;
      box-shadow:0 3px 8px #00000044;
    }

    /* ══════════════ WANTED PAPER (flat on sand) ══════════════ */
    .wanted-paper {
      position:absolute;
      /* sit right on the beach surface */
      bottom:calc(23% - 18px);
      left:37%;
      z-index:11;
      width:54px; height:66px;
      /* perspective squish: looks like it's lying flat */
      transform:perspective(200px) rotateX(52deg) rotateZ(-6deg);
      transform-origin:bottom center;
      background:#f4e8c4;
      border:1.5px solid #c8a458;
      box-shadow:2px 2px 6px #00000044, inset 0 0 8px #c8a04022;
      cursor:pointer;
      transition:filter 0.2s;
      display:flex; flex-direction:column;
      align-items:center; justify-content:flex-end;
      padding-bottom:5px;
    }
    .wanted-paper:hover { filter:brightness(1.1); }
    /* crumple texture lines */
    .wanted-paper::before {
      content:''; position:absolute; inset:0;
      background:repeating-linear-gradient(
        180deg, transparent 0, transparent 7px,
        #c8a04022 7px, #c8a04022 8px
      );
    }
    .paper-label {
      font-family:'Nunito',sans-serif;
      font-size:7px; font-weight:900;
      color:#7a2a00; letter-spacing:1.5px;
      position:relative; z-index:1;
    }
    /* tiny shadow on the sand */
    .wanted-paper::after {
      content:''; position:absolute;
      bottom:-6px; left:5px; right:5px; height:6px;
      background:radial-gradient(ellipse,#00000033,transparent 70%);
      border-radius:50%;
    }

    /* ══════════════ WANTED MODAL ══════════════ */
    .wanted-modal {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.78);
      z-index:200;
      align-items:center; justify-content:center;
    }
    .wanted-modal.show { display:flex; }
    .wanted-poster {
      background:#f4e8c4;
      border:16px solid #7a4a10;
      box-shadow:0 0 0 8px #4a2a00, 0 24px 80px #000000aa;
      padding:40px 30px 20px;
      width:90vw; height:90vh;
      max-width:900px; max-height:800px;
      display:flex; flex-direction:column; align-items:center; gap:20px;
      animation:poster-pop 0.22s cubic-bezier(.34,1.56,.64,1);
      position:relative;
    }
    @keyframes poster-pop{from{transform:scale(0.6) rotate(-4deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
    .poster-top {
      font-family:'Pacifico',cursive; font-size:12px;
      color:#4a1a00; letter-spacing:5px;
      border-bottom:2px solid #7a4a10;
      width:100%; text-align:center; padding-bottom:6px;
    }
    .poster-img-wrap {
      width:100%; flex:1;
      border:8px solid #7a4a10;
      overflow:hidden; background:#c8a870;
      display:flex; align-items:center; justify-content:center;
    }
    .poster-img-wrap img { width:100%; height:100%; object-fit:contain; display:block; }
    .poster-img-wrap .img-ph {
      font-size:9px; color:#7a4a10; text-align:center; padding:10px; font-family:'Nunito',sans-serif;
    }
    .poster-bottom {
      font-family:'Pacifico',cursive; font-size:34px;
      color:#8b0000; letter-spacing:8px;
      text-shadow:2px 2px 0 #4a0000, 0 0 20px #ff000055;
    }
    .poster-close {
      position:absolute; top:12px; right:16px;
      font-size:36px; color:#7a4a10; cursor:pointer; font-weight:900; line-height:1;
    }
    .poster-close:hover { color:#8b0000; }

    /* ══════════════ TITLE + PLAY ══════════════ */
    .title-wrap {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-58%);
      z-index:20;
      display:flex; flex-direction:column; align-items:center; gap:20px;
      text-align:center;
      transition:opacity 0.4s;
    }
    .main-title {
      font-family:'Pacifico',cursive;
      font-size:clamp(52px,8vw,100px);
      color:#ffffff;
      text-shadow:3px 3px 0 #d47800, 7px 7px 0 #a05000,
                  0 0 50px #ffd700aa, 0 0 100px #ff990055;
      line-height:1; letter-spacing:2px;
      animation:title-bob 5s ease-in-out infinite;
    }
    @keyframes title-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
    .subtitle {
      font-family:'Nunito',sans-serif; font-size:clamp(13px,2vw,19px);
      color:#ffe9a8; letter-spacing:8px; text-transform:uppercase;
      text-shadow:0 2px 10px #00000055; margin-top:-10px;
    }
    .play-btn {
      width:72px; height:72px;
      background:radial-gradient(circle at 35% 35%,#fffbe0,#ffd700);
      border:none; border-radius:50%;
      box-shadow:0 5px 0 #a07800, 0 9px 0 #7a5500, 0 14px 30px #00000055;
      cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:transform 0.1s, box-shadow 0.1s;
      animation:play-pulse 2s ease-in-out infinite alternate;
    }
    .play-btn:hover{transform:translateY(-4px);box-shadow:0 9px 0 #a07800,0 13px 0 #7a5500,0 18px 30px #00000055;}
    .play-btn:active{transform:translateY(5px);box-shadow:0 0 0 #a07800,0 4px 0 #7a5500;}
    @keyframes play-pulse{
      from{box-shadow:0 5px 0 #a07800,0 9px 0 #7a5500,0 14px 30px #00000044,0 0 20px #ffd70044;}
      to  {box-shadow:0 5px 0 #a07800,0 9px 0 #7a5500,0 14px 30px #00000044,0 0 50px #ffd700cc;}
    }
    .play-icon{width:0;height:0;border-top:16px solid transparent;border-bottom:16px solid transparent;border-left:28px solid #a07800;margin-left:7px;}

    /* ══════════════ INSTRUCTION OVERLAY ══════════════ */
    .instr-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 80;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 0;
    }
    .instr-overlay.show { display: flex; }

    .instr-dialog {
      width: 100%;
      background: linear-gradient(135deg, #7a1200 0%, #c43a00 40%, #e86000 70%, #c43a00 100%);
      border-top: 4px solid #ffaa00;
      box-shadow: 0 -4px 0 #8b2200, inset 0 2px 0 #ff8844, 0 0 60px #ff440033;
      padding: 28px 44px 28px 44px;
      display: flex; align-items: center;
      justify-content: space-between; gap: 24px;
      min-height: 160px;
      position: relative;
    }
    /* inner glow stripe at top */
    .instr-dialog::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, transparent, #ffdd88, #ff8844, #ffdd88, transparent);
    }
    .instr-text-wrap { flex: 1; position: relative; overflow: hidden; }
    .instr-text {
      color: #fff8ee;
      font-family: 'Press Start 2P', monospace;
      font-size: 13px; line-height: 2.1;
      letter-spacing: 0.4px; white-space: pre-wrap;
      text-shadow: 0 1px 4px #00000066;
    }
    .instr-text::after {
      content: '▮'; color: #ffdd44;
      animation: blink-c 0.7s step-end infinite;
    }
    .instr-text.done::after { display: none; }
    @keyframes blink-c { 0%,100%{opacity:1} 50%{opacity:0} }
    .instr-arrow {
      color: #ffdd44; font-size: 18px;
      align-self: flex-end; padding-bottom: 4px;
      display: none;
      animation: arr-b 0.6s ease-in-out infinite alternate;
      text-shadow: 0 0 8px #ffaa00;
    }
    .instr-arrow.visible { display: block; }
    @keyframes arr-b { from{transform:translateY(0)} to{transform:translateY(7px)} }
    .instr-counter {
      position: absolute; top: -20px; right: 0;
      color: #ffdd88; font-family: 'Press Start 2P', monospace;
      font-size: 8px; opacity: 0.7;
    }

    /* ══════════════ VIDEO OVERLAY ══════════════ */
    .video-overlay {
      display: none;
      position: fixed; inset: 0;
      background: #000;
      z-index: 90;
      align-items: center;
      justify-content: center;
    }
    .video-overlay.show { display: flex; }
    .video-wrap {
      position: relative;
      width: 96vw;
      aspect-ratio: 16/9;
      background: #000;
      overflow: hidden;
    }
    .video-wrap video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .video-placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 14px;
      color: #ffaa44; font-family: 'Press Start 2P', monospace;
      font-size: 11px; text-align: center; padding: 20px;
      background: #000;
    }
    .video-placeholder .vid-icon { font-size: 48px; opacity: 0.6; }

    .continue-btn {
      display: none;
      position: fixed;
      bottom: 32px;
      right: 36px;
      background: linear-gradient(135deg, #ff8800, #ff4400);
      color: #fff8ee;
      border: none; padding: 16px 44px;
      font-family: 'Press Start 2P', monospace;
      font-size: 13px; cursor: pointer; letter-spacing: 2px;
      box-shadow: 4px 4px 0 #aa2200, 8px 8px 0 #7a1400;
      animation: btn-glow 1.5s ease-in-out infinite alternate;
      transition: transform 0.1s;
      z-index: 100;
    }
    .continue-btn.visible { display: block; }
    .continue-btn:hover  { filter: brightness(1.15); }
    .continue-btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #aa2200; }
    @keyframes btn-glow {
      from { box-shadow: 4px 4px 0 #aa2200, 8px 8px 0 #7a1400, 0 0 14px #ff660044; }
      to   { box-shadow: 4px 4px 0 #aa2200, 8px 8px 0 #7a1400, 0 0 34px #ff8800cc; }
    }

  
    .seagull{position:absolute;z-index:3;animation:gull-fly linear infinite;font-size:20px;opacity:0.75;}
    .g1{top:20%;animation-duration:20s;}
    .g2{top:14%;animation-duration:28s;animation-delay:-9s;font-size:13px;}
    .g3{top:27%;animation-duration:34s;animation-delay:-17s;font-size:15px;}
    @keyframes gull-fly{from{left:-60px}to{left:110vw}}
  </style>
</head>
<body>

  <div class="sky"></div>
  <div class="sun"></div>
  <div class="sun-rays"></div>

  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>

  <div class="seagull g1">🕊</div>
  <div class="seagull g2">🕊</div>
  <div class="seagull g3">🕊</div>

  <!-- ═══ CITY BACK LAYER — distant hazy towers ═══ -->

               L1040,48 L1040,28 L1054,28 L1054,12 L1068,5 L1082,12 L1082,28 L1105,28 L1105,46
               L1135,46 L1135,28 L1149,28 L1149,12 L1163,5 L1177,12 L1177,28 L1200,28 L1200,46

<script>
  /* ═══════════════════════════════════════════════════════
     ██  INSTRUCTION MESSAGES — ADD YOUR LINES HERE  ██
     Each string is one dialog page. Use \n for line breaks.
  ═══════════════════════════════════════════════════════ */
  const INSTRUCTIONS = [
    "Welcome to Da Nang 2025!\nGet ready for the adventure.",
    "Your mission: explore the city,\nfind hidden secrets on the beach.",
    "Watch out for the WANTED poster —\nsomeone suspicious is around...",
    "Collect items, talk to locals,\nand enjoy the summer vibes.",
    "The rules are simple:\nhave fun and don't lose your sunscreen.",
    "One last thing before we begin...\nWatch this carefully.",
  ];
  /* ═══════════════════════════════════════════════════════
     ██  END OF INSTRUCTION MESSAGES  ██
  ═══════════════════════════════════════════════════════ */


  // ── Play button → fade title → show instructions ──────
  document.getElementById('play-btn').addEventListener('click', () => {
    const tw = document.getElementById('title-wrap');
    tw.style.opacity = '0';
    setTimeout(() => {
      tw.style.display = 'none';
      startInstructions();
    }, 420);
  });


  // ── Instruction dialog ────────────────────────────────
  const instrOverlay = document.getElementById('instr-overlay');
  const instrText    = document.getElementById('instr-text');
  const instrArrow   = document.getElementById('instr-arrow');
  const instrCounter = document.getElementById('instr-counter');

  let iIdx     = 0;
  let iTyping  = false;
  let iTimeout = null;
  let iFull    = '';
  let iChar    = 0;

  function startInstructions() {
    instrOverlay.classList.add('show');
    showInstrMsg(0);
  }

  function updateInstrCounter() {
    instrCounter.textContent = `${iIdx + 1} / ${INSTRUCTIONS.length}`;
  }

  function showInstrMsg(idx) {
    iIdx    = idx;
    iFull   = INSTRUCTIONS[idx];
    iChar   = 0;
    iTyping = true;
    instrText.textContent = '';
    instrText.classList.remove('done');
    instrArrow.classList.remove('visible');
    updateInstrCounter();

    function tick() {
      if (iChar < iFull.length) {
        instrText.textContent = iFull.slice(0, ++iChar);
        iTimeout = setTimeout(tick, 36);
      } else {
        iTyping = false;
        instrText.classList.add('done');
        if (iIdx < INSTRUCTIONS.length - 1) {
          instrArrow.classList.add('visible');
        } else {
          // Last message done → show video
          instrArrow.classList.remove('visible');
          setTimeout(showVideo, 500);
        }
      }
    }
    tick();
  }

  function instrAdvance() {
    if (iTyping) {
      // skip to end of current message
      clearTimeout(iTimeout);
      iTyping = false;
      instrText.textContent = iFull;
      instrText.classList.add('done');
      if (iIdx < INSTRUCTIONS.length - 1) {
        instrArrow.classList.add('visible');
      } else {
        setTimeout(showVideo, 500);
      }
      return;
    }
    if (iIdx >= INSTRUCTIONS.length - 1) return;
    showInstrMsg(iIdx + 1);
  }

  instrOverlay.addEventListener('click', instrAdvance);


  // ── Video ─────────────────────────────────────────────
  const videoOverlay = document.getElementById('video-overlay');
  const gameVideo    = document.getElementById('game-video');
  const continueBtn  = document.getElementById('continue-btn');

  function showVideo() {
    instrOverlay.classList.remove('show');
    videoOverlay.classList.add('show');

    // Try to play the video; show continue button once it starts
    const playPromise = gameVideo.play();
    if (playPromise !== undefined) {
      playPromise.then(() => {
        continueBtn.classList.add('visible');
      }).catch(() => {
        // Video couldn't play (file missing) — show button anyway
        continueBtn.classList.add('visible');
      });
    } else {
      continueBtn.classList.add('visible');
    }

    // Also show continue if video metadata loads (fallback)
    gameVideo.addEventListener('play', () => {
      continueBtn.classList.add('visible');
    }, { once: true });

    // Show continue when video ends too
    gameVideo.addEventListener('ended', () => {
      continueBtn.classList.add('visible');
    }, { once: true });
  }

  // ── Wanted paper ──────────────────────────────────────
  const paper = document.getElementById('wanted-paper');
  const modal  = document.getElementById('wanted-modal');
  paper.addEventListener('click', e => { e.stopPropagation(); modal.classList.add('show'); });
  function closeWanted() { modal.classList.remove('show'); }
  modal.addEventListener('click', e => { if (e.target === modal) closeWanted(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeWanted(); });

</script>
