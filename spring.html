<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Protect Our Home</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a1208;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            user-select: none;
        }

        #wrap {
            position: relative;
        }

        canvas {
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            display: block;
        }

        /* Title overlay */
        #ui {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            pointer-events: none;
            padding: 20px 0 36px;
        }

        #title-box {
            text-align: center;
        }

        #title-text {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff8e8;
            text-shadow: 2px 2px 0 #7a2200, 4px 4px 0 rgba(0, 0, 0, 0.4);
        }

        #sub {
            color: #ffddaa;
            font-size: 12px;
            letter-spacing: 4px;
            margin-top: 6px;
            opacity: 0.75;
        }

        #btn-play {
            pointer-events: all;
            cursor: pointer;
            background: linear-gradient(180deg, #ff6633, #cc2200 60%, #881100);
            border: 3px solid #ffaa44;
            color: #fff8e0;
            font-family: 'Courier New', monospace;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 5px;
            padding: 13px 50px;
            box-shadow: 0 5px 0 #550000;
            clip-path: polygon(6px 0%, calc(100% - 6px) 0%, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 0% calc(100% - 6px), 0% 6px);
            transition: transform .1s, box-shadow .1s;
        }

        #btn-play:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 0 #550000;
        }

        #btn-play:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #550000;
        }

        /* Video overlay */
        #video-overlay {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #video-overlay.show {
            display: flex;
        }

        #video-frame {
            border: 4px solid #ffaa44;
            background: #000;
            width: 700px;
            height: 394px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 18px;
        }

        /* Story text panel */
        #story-textbox {
            display: none;
            width: 700px;
            background: rgba(10, 8, 20, 0.95);
            border: 3px solid #ffaa44;
            padding: 22px 28px 20px;
            margin-bottom: 20px;
        }

        #story-textbox .nametag {
            color: #ff6633;
            font-size: 11px;
            letter-spacing: 3px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        #story-textbox .story-line {
            color: #fff0cc;
            font-size: 13px;
            line-height: 1.85;
            letter-spacing: 1px;
            min-height: 28px;
        }

        #story-textbox .cursor {
            display: inline-block;
            width: 8px;
            height: 13px;
            background: #ffaa44;
            vertical-align: middle;
            margin-left: 2px;
            animation: blink .6s step-end infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0
            }
        }

        /* Wall of KFC reveal panel */
        #wkfc-panel {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        #wkfc-canvas {
            border: 4px solid #ccaa77;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.6);
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            margin-bottom: 14px;
        }

        #wkfc-caption {
            color: #ff4422;
            font-size: 15px;
            letter-spacing: 5px;
            font-weight: bold;
            text-shadow: 0 0 12px rgba(255, 60, 0, 0.8);
            animation: redpulse 1.2s ease-in-out infinite;
        }

        @keyframes redpulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.6
            }
        }

        #video-frame video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video-placeholder {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 220, 150, 0.5);
            font-size: 13px;
            text-align: center;
        }

        #video-placeholder span {
            font-size: 44px;
            display: block;
            margin-bottom: 10px;
            opacity: 0.3;
        }

        #btn-continue {
            cursor: pointer;
            background: linear-gradient(180deg, #44aa44, #228822 60%, #115511);
            border: 3px solid #88ff88;
            color: #e8ffe8;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 4px;
            padding: 12px 44px;
            box-shadow: 0 5px 0 #002200;
            clip-path: polygon(6px 0%, calc(100% - 6px) 0%, 100% 6px, 100% calc(100% - 6px), calc(100% - 6px) 100%, 6px 100%, 0% calc(100% - 6px), 0% 6px);
            transition: transform .1s;
        }

        #btn-continue:hover {
            transform: translateY(-2px);
        }

        .vlab {
            color: #ffddaa;
            font-size: 11px;
            letter-spacing: 3px;
            margin-bottom: 14px;
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div id="wrap">
        <canvas id="c"></canvas>
        <div id="ui">
            <div id="title-box">
                <div id="title-text">PROTECT OUR HOME</div>
                <div id="sub">— A SPRING ADVENTURE —</div>
            </div>
            <button id="btn-play" onclick="showVideo()">▶ PLAY</button>
        </div>
        <div id="video-overlay">
            <div class="vlab" id="vlab-top">◆ WATCH THE STORY ◆</div>

            <!-- STEP 0: kfc.mp4 -->
            <div id="panel-video" style="display:none; width:90vw; height:80vh; max-width:1000px; background:#000;">
                <video id="story-video" src="public/kfc.mp4" controls style="width:100%;height:100%;object-fit:contain;"></video>
            </div>

            <!-- STEP 1: kfc.jpg -->
            <div id="panel-img1" style="display:none; width:90vw; height:80vh; max-width:1000px; background:#000;">
                <img src="public/kfc.jpg" style="width:100%; height:100%; object-fit:contain; border:4px solid #ccaa77; box-shadow:0 0 20px rgba(0,0,0,0.6);" />
            </div>

            <!-- STEP 2: angry.jpg -->
            <div id="panel-img2" style="display:none; width:90vw; height:80vh; max-width:1000px; background:#000;">
                <img src="public/angry.jpg" style="width:100%; height:100%; object-fit:contain; border:4px solid #ff4422; box-shadow:0 0 30px rgba(255,0,0,0.6);" />
            </div>

            <button id="btn-continue" onclick="handleContinue()">CONTINUE ▶</button>
        </div>
    </div>

    <script>
        var canvas = document.getElementById('c');
        var ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        var W = window.innerWidth, H = window.innerHeight;
        canvas.width = W; canvas.height = H;
        var GY = Math.floor(H * 0.61);
        var t = 0;
        
        window.addEventListener('resize', function() {
            window.location.reload();
        });

        function px(x, y, w, h, c) {
            ctx.fillStyle = c;
            ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
        }

        // ── Petals
        var petals = [];
        for (var i = 0; i < 10; i++) {
            petals.push({
                x: Math.random() * W, y: Math.random() * H * 0.7,
                vx: -3 + Math.random() * 6, vy: 10 + Math.random() * 12,
                rot: Math.random() * 6.28, sz: 2 + Math.floor(Math.random() * 3),
                col: ['#ffb3cc', '#ff88aa', '#ffd0e0', '#ffffff', '#ffccdd'][Math.floor(Math.random() * 5)]
            });
        }

        // ── Ducks (pond left and right)
        var ducks = [
            { ox: 70, baseY: GY + 30, dir: 1, spd: 18, wx: 0 },
            { ox: 180, baseY: GY + 46, dir: -1, spd: 14, wx: 0 },
            { ox: W - 230, baseY: GY + 32, dir: 1, spd: 16, wx: 0 },
            { ox: W - 120, baseY: GY + 44, dir: -1, spd: 20, wx: 0 }
        ];

        // ── Fish
        var fish = [
            { x: 80, y: GY + 46, dir: 1, spd: 26, minX: 32, maxX: 256 },
            { x: 200, y: GY + 58, dir: -1, spd: 20, minX: 32, maxX: 256 },
            { x: W - 200, y: GY + 48, dir: 1, spd: 24, minX: W - 266, maxX: W - 34 },
            { x: W - 90, y: GY + 60, dir: -1, spd: 18, minX: W - 266, maxX: W - 34 }
        ];

        // ── Frogs
        var frogs = [
            { x: 28, y: GY + 6, blinkT: 0, hop: 0, hopV: 0 },
            { x: 264, y: GY + 4, blinkT: 1.8, hop: 0, hopV: 0 },
            { x: W - 44, y: GY + 6, blinkT: 0.6, hop: 0, hopV: 0 },
            { x: W - 270, y: GY + 4, blinkT: 2.4, hop: 0, hopV: 0 }
        ];

        // ── Bunnies
        var bunnies = [
            { ox: W / 2 - 190, y: GY + 2, dir: 1, spd: 22, wx: 0, hop: 0 },
            { ox: W / 2 + 100, y: GY + 2, dir: -1, spd: 18, wx: 0, hop: 0 }
        ];

        // ── Butterflies
        var butterflies = [
            { bx: 380, by: GY - 75, phase: 0, col: '#ff88cc', col2: '#ff44aa' },
            { bx: 680, by: GY - 95, phase: 2.1, col: '#ffee44', col2: '#ffaa00' },
            { bx: 130, by: GY - 55, phase: 1.1, col: '#aaddff', col2: '#5599ff' },
            { bx: 960, by: GY - 65, phase: 3.2, col: '#cc88ff', col2: '#9933ff' }
        ];

        // ── Birds
        var birds = [
            { x: 0, y: 88, spd: 52 },
            { x: -90, y: 66, spd: 44 },
            { x: W + 20, y: 108, spd: -56 }
        ];

        // ── Cat state
        var catTailT = 0;

        // ══════════════════════════════════════════════════════════════════════════
        // UPDATE
        // ══════════════════════════════════════════════════════════════════════════
        function update(dt) {
            t += dt;
            catTailT += dt;

            // ducks
            for (var i = 0; i < ducks.length; i++) {
                var d = ducks[i];
                d.wx += d.spd * d.dir * dt;
                if (d.wx > 60) d.dir = -1;
                if (d.wx < -60) d.dir = 1;
            }

            // fish
            for (var i = 0; i < fish.length; i++) {
                var f = fish[i];
                f.x += f.spd * f.dir * dt;
                if (f.x > f.maxX) { f.x = f.maxX; f.dir = -1; }
                if (f.x < f.minX) { f.x = f.minX; f.dir = 1; }
            }

            // frogs blink + hop
            for (var i = 0; i < frogs.length; i++) {
                var fr = frogs[i];
                fr.blinkT += dt;
                if (fr.hopV === 0 && Math.random() < dt * 0.3) {
                    fr.hopV = 55 + Math.random() * 40;
                }
                if (fr.hopV > 0) {
                    fr.hop += fr.hopV * dt;
                    if (fr.hop > 7) { fr.hop = 0; fr.hopV = 0; }
                }
            }

            // bunnies
            for (var i = 0; i < bunnies.length; i++) {
                var b = bunnies[i];
                b.wx += b.spd * b.dir * dt;
                if (b.wx > 70) b.dir = -1;
                if (b.wx < -70) b.dir = 1;
                b.hop = Math.abs(Math.sin(t * 5 + b.wx * 0.1)) * 8;
            }

            // birds
            for (var i = 0; i < birds.length; i++) {
                var b = birds[i];
                b.x += b.spd * dt;
                if (b.spd > 0 && b.x > W + 50) b.x = -50;
                if (b.spd < 0 && b.x < -50) b.x = W + 50;
            }

            // petals
            for (var i = 0; i < petals.length; i++) {
                var pt = petals[i];
                pt.x += pt.vx * dt; pt.y += pt.vy * dt; pt.rot += dt;
                if (pt.y > H + 10) { pt.y = -8; pt.x = Math.random() * W; }
            }
        }

        // ══════════════════════════════════════════════════════════════════════════
        // DRAW HELPERS
        // ══════════════════════════════════════════════════════════════════════════
        function drawSky() {
            var g = ctx.createLinearGradient(0, 0, 0, GY);
            g.addColorStop(0, '#a0d4f0'); g.addColorStop(0.55, '#d0eaff'); g.addColorStop(1, '#c4eece');
            ctx.fillStyle = g; ctx.fillRect(0, 0, W, GY);
        }

        function drawSun() {
            var sx = Math.floor(W * 0.84), sy = 60;
            px(sx - 26, sy - 26, 52, 52, '#fff5b8'); px(sx - 22, sy - 22, 44, 44, '#fffde0'); px(sx - 14, sy - 14, 28, 28, 'rgba(255,255,255,0.8)');
            for (var i = 0; i < 8; i++) {
                var a = i / 8 * Math.PI * 2 + t * 0.22;
                px(sx + Math.cos(a) * 46 - 3, sy + Math.sin(a) * 46 - 3, 6, 6, 'rgba(255,240,160,0.38)');
                px(sx + Math.cos(a) * 60 - 2, sy + Math.sin(a) * 60 - 2, 4, 4, 'rgba(255,240,160,0.18)');
            }
        }

        function drawCloud(x, y, s) {
            px(x, y, 80 * s, 16 * s, 'rgba(255,255,255,0.84)');
            px(x + 10 * s, y - 10 * s, 54 * s, 14 * s, 'rgba(255,255,255,0.84)');
            px(x + 24 * s, y - 18 * s, 32 * s, 12 * s, 'rgba(255,255,255,0.84)');
        }

        function drawClouds() {
            drawCloud(50 + (t * 14 % 430 | 0), 44, 1);
            drawCloud(360 + (t * 10 % 510 | 0), 70, 0.82);
            drawCloud(700 + (t * 12 % 450 | 0), 36, 0.9);
        }

        function drawMountain(cx, peakY, w, col, snowCol) {
            for (var i = 0; i < GY - peakY; i++) {
                var hw = w * (i / (GY - peakY));
                px(cx - hw / 2, peakY + i, hw, 1, col);
            }
            // Snow cap
            var snowH = (GY - peakY) * 0.22;
            for (var i = 0; i < snowH; i++) {
                var sw = w * (i / (GY - peakY)) * 0.8;
                px(cx - sw / 2, peakY + i, sw, 1, snowCol);
            }
            // Snow highlight edge
            for (var i = 0; i < snowH * 0.4; i++) {
                var sw = w * (i / (GY - peakY)) * 0.35;
                px(cx - sw / 2, peakY + i, sw, 1, '#ffffff');
            }
        }

        function drawMountains() {
            // Back row (lighter, further)
            drawMountain(150, GY - 210, 280, 'rgba(140,160,190,0.55)', 'rgba(230,240,255,0.7)');
            drawMountain(440, GY - 240, 320, 'rgba(130,150,180,0.50)', 'rgba(230,240,255,0.7)');
            drawMountain(720, GY - 220, 300, 'rgba(140,160,190,0.52)', 'rgba(230,240,255,0.7)');
            drawMountain(980, GY - 200, 260, 'rgba(130,150,180,0.48)', 'rgba(230,240,255,0.7)');
            drawMountain(1240, GY - 230, 310, 'rgba(140,160,190,0.52)', 'rgba(230,240,255,0.7)');
            drawMountain(1520, GY - 210, 280, 'rgba(130,150,180,0.50)', 'rgba(230,240,255,0.7)');
            drawMountain(1800, GY - 235, 330, 'rgba(140,160,190,0.55)', 'rgba(230,240,255,0.7)');
            drawMountain(2100, GY - 215, 290, 'rgba(130,150,180,0.48)', 'rgba(230,240,255,0.7)');
            drawMountain(2400, GY - 225, 300, 'rgba(140,160,190,0.52)', 'rgba(230,240,255,0.7)');
            drawMountain(2700, GY - 200, 270, 'rgba(130,150,180,0.48)', 'rgba(230,240,255,0.7)');
            // Front row (darker, closer)
            drawMountain(60, GY - 160, 200, 'rgba(100,120,150,0.65)', 'rgba(220,235,255,0.8)');
            drawMountain(320, GY - 180, 240, 'rgba(90,115,145,0.65)', 'rgba(220,235,255,0.8)');
            drawMountain(600, GY - 170, 230, 'rgba(100,120,150,0.65)', 'rgba(220,235,255,0.8)');
            drawMountain(860, GY - 155, 210, 'rgba(90,115,145,0.60)', 'rgba(220,235,255,0.8)');
            drawMountain(1060, GY - 145, 190, 'rgba(100,120,150,0.58)', 'rgba(220,235,255,0.8)');
            drawMountain(1280, GY - 175, 250, 'rgba(90,115,145,0.65)', 'rgba(220,235,255,0.8)');
            drawMountain(1500, GY - 160, 220, 'rgba(100,120,150,0.60)', 'rgba(220,235,255,0.8)');
            drawMountain(1740, GY - 185, 240, 'rgba(90,115,145,0.65)', 'rgba(220,235,255,0.8)');
            drawMountain(1980, GY - 165, 230, 'rgba(100,120,150,0.60)', 'rgba(220,235,255,0.8)');
            drawMountain(2220, GY - 170, 220, 'rgba(90,115,145,0.62)', 'rgba(220,235,255,0.8)');
            drawMountain(2460, GY - 150, 200, 'rgba(100,120,150,0.58)', 'rgba(220,235,255,0.8)');
            drawMountain(2700, GY - 160, 230, 'rgba(90,115,145,0.60)', 'rgba(220,235,255,0.8)');
        }

        function drawGround() {
            var g = ctx.createLinearGradient(0, GY, 0, H);
            g.addColorStop(0, '#5aaa28'); g.addColorStop(0.1, '#3a7a18');
            g.addColorStop(0.28, '#7a5220'); g.addColorStop(1, '#4a3010');
            ctx.fillStyle = g; ctx.fillRect(0, GY, W, H - GY);
            for (var x = 0; x < W; x += 6) {
                var gh = 2 + Math.sin(x * 0.11) * 2 + Math.cos(x * 0.07) * 1.5;
                px(x, GY - gh, 6, gh + 3, '#5aaa28');
            }
            px(0, GY, W, 2, '#3d8010');
            for (var y = GY + 22; y < H; y += 22) px(0, y, W, 2, 'rgba(0,0,0,0.07)');
        }

        function drawPath() {
            var cx = W / 2;
            for (var i = 0; i < 8; i++) {
                var py2 = GY + 6 + i * 22, pw = 18 + i * 6, px2 = cx - pw / 2 + Math.sin(i * 0.6) * 2;
                px(px2, py2, pw, 14, '#c0a878'); px(px2 + 2, py2 + 2, pw - 4, 10, '#d4bc8c');
                px(px2, py2, pw, 2, '#e0ccaa');
            }
        }

        function drawPond(ox, oy, ow, oh) {
            var g = ctx.createLinearGradient(ox, oy, ox, oy + oh);
            g.addColorStop(0, '#5a9ac8'); g.addColorStop(0.5, '#3a7aaa'); g.addColorStop(1, '#1a4a77');
            ctx.fillStyle = g; ctx.fillRect(ox, oy, ow, oh);
            px(ox, oy, ow, 4, '#6ab4d8'); px(ox, oy + oh - 3, ow, 3, '#1a3a66');
            for (var i = 0; i < 9; i++) {
                px(ox, oy + i, i, 1, '#5aaa28'); px(ox + ow - i, oy + i, i, 1, '#5aaa28');
                px(ox, oy + oh - i - 1, i, 1, '#5aaa28'); px(ox + ow - i, oy + oh - i - 1, i, 1, '#5aaa28');
            }
            for (var i = 0; i < 3; i++) {
                var rx = ox + 22 + i * ow / 4, ry = oy + 14 + i * 12;
                px(rx, ry, 36 - i * 6, 2, 'rgba(130,190,220,' + (0.18 + 0.07 * Math.sin(t * 2.2 + i)) + ')');
            }
            for (var sx = ox + 8; sx < ox + ow - 8; sx += 14) {
                px(sx, oy + 8 + Math.sin(t * 3 + sx * 0.07) * 3, 8, 2, 'rgba(180,220,250,0.18)');
            }
            lilyPad(ox + 26, oy + 26); lilyPad(ox + ow - 60, oy + 18); lilyPad(ox + ow / 2 - 6, oy + oh - 22);
        }

        function lilyPad(x, y) {
            px(x, y, 14, 8, '#2a8a2a'); px(x + 2, y - 2, 10, 12, '#2a8a2a'); px(x + 4, y, 6, 6, '#3aaa3a');
            ctx.clearRect(Math.floor(x + 4), Math.floor(y), 5, 3); px(x + 4, y, 5, 3, '#3a7aaa');
            if ((x + y) % 28 < 14) { px(x + 3, y - 5, 6, 5, '#ffaacc'); px(x + 5, y - 3, 2, 2, '#ffff88'); }
        }

        function drawCherryTree(x, y, sz, tiltX) {
            var tx = x + (tiltX || 0);
            // Tall trunk
            px(tx - sz, y, sz * 2, sz * 16, '#7a4a1a'); px(tx - sz + 2, y, sz * 2 - 4, sz * 16, '#8a5a2a');
            // branches higher up
            px(tx - sz * 7, y - sz * 5, sz * 6, sz, '#7a4a1a');
            px(tx + sz, y - sz * 7, sz * 6, sz, '#7a4a1a');
            px(tx - sz * 4, y - sz * 11, sz * 3, sz, '#7a4a1a');
            px(tx + sz * 2, y - sz * 12, sz * 3, sz, '#7a4a1a');
            var cols = ['#ff88aa', '#ffaacc', '#ff6699', '#ffbbdd', '#ff99bb', '#ffddee'];
            var blobs = [
                [0, -20], [sz * 6, -16], [-sz * 6, -15], [sz * 3, -26], [-sz * 3, -25],
                [sz * 9, -10], [-sz * 9, -9], [sz * 1, -30], [-sz * 1, -31], [sz * 5, -28], [-sz * 5, -27]
            ];
            for (var i = 0; i < blobs.length; i++) {
                var dx = blobs[i][0], dy = blobs[i][1];
                var bx = tx + dx, by = y + dy * (sz * 0.27);
                var c = cols[i % cols.length], c2 = cols[(i + 2) % cols.length];

                px(fx, fy - 4, 6, 4, fc[i % fc.length]); px(fx + 1, fy - 6, 4, 7, fc[i % fc.length]);
                px(fx + 1, fy - 4, 4, 3, '#ffffaa');

            for (var i = 0; i < 5; i++) px(x + i * w / 5 + 3, y + h * 0.12 + Math.sin(i) * 5, 6, 6, fc[i % 3]);
        }

        // DRAW SCENE
        // ══════════════════════════════════════════════════════════════════════════
        function drawScene() {
            drawSky(); drawSun(); drawClouds();
            drawMountains();
            drawGround(); drawPath();

            // birds in sky
            for (var i = 0; i < birds.length; i++) {
                drawBird(birds[i].x, birds[i].y, Math.sin(t * 8 + birds[i].x * 0.05) > 0);
            }

            // trees
            drawCherryTree(75, GY, 5, -2);
            drawCherryTree(240, GY, 4, -1);
            drawCherryTree(W - 85, GY, 5, 2);
            drawCherryTree(W - 255, GY, 4, 1);

            // LEFT POND
            var lx = 28, lw = 246, ly = GY + 10, lh = 82;
            drawPond(lx, ly, lw, lh);
            for (var i = 0; i < 2; i++) drawFish(fish[i].x, fish[i].y, fish[i].dir < 0);
            for (var i = 0; i < 2; i++) {
                var d = ducks[i], dx = d.ox + d.wx;
                if (dx > lx + 4 && dx < lx + lw - 18) drawDuck(dx, d.baseY, d.dir < 0);
            }
            drawFrog(lx - 5, GY + 4, Math.sin(frogs[0].blinkT * 1.2) > 0.9);
            drawFrog(lx + lw - 8, GY + 4, Math.sin(frogs[1].blinkT * 1.1) > 0.9);

            // RIGHT POND
            var rx = W - 274, rw = 246, ry = GY + 12, rh = 78;
            drawPond(rx, ry, rw, rh);
            for (var i = 2; i < 4; i++) drawFish(fish[i].x, fish[i].y, fish[i].dir < 0);
            for (var i = 2; i < 4; i++) {
                var d = ducks[i], dx = d.ox + d.wx;
                if (dx > rx + 4 && dx < rx + rw - 18) drawDuck(dx, d.baseY, d.dir < 0);
            }
            drawFrog(rx - 5, GY + 6, Math.sin(frogs[2].blinkT * 1.3) > 0.9);
            drawFrog(rx + rw - 8, GY + 5, Math.sin(frogs[3].blinkT * 1.0) > 0.9);

            // bushes & flowers
            drawBush(0, GY + 4, 88, 46);
            drawBush(W - 88, GY + 4, 88, 46);
            drawFlowerPatch(22, GY + 8, 8, 14);
            drawFlowerPatch(285, GY + 6, 7, 16);
            drawFlowerPatch(W / 2 - 170, GY + 10, 6, 14);
            drawFlowerPatch(W / 2 + 94, GY + 10, 6, 14);
            drawFlowerPatch(W - 265, GY + 6, 7, 16);
            drawFlowerPatch(W - 38, GY + 8, 8, 14);

            // bunnies
            for (var i = 0; i < bunnies.length; i++) {
                var b = bunnies[i];
                drawBunny(b.ox + b.wx, b.y, b.hop, b.dir < 0);
            }

            // butterflies
            for (var i = 0; i < butterflies.length; i++) {
                var bf = butterflies[i];
                var bfx = bf.bx + Math.sin(t * 0.9 + bf.phase) * 50;
                var bfy = bf.by + Math.cos(t * 1.1 + bf.phase) * 22 + Math.sin(t * 0.6 + bf.phase) * 14;
                drawButterfly(bfx, bfy, Math.sin(t * 5 + bf.phase) > 0, bf.col, bf.col2);
            }

            // neighboring houses
            drawNeighborHouse(W / 2 - 340, GY - 50, 0.7);
            drawNeighborHouse(W / 2 + 160, GY - 58, 0.8);

            // house
            drawHouse();

            // Car parked left of house
            drawCar(W / 2 - 210, GY);

            // cat by house right side
            drawCat(W / 2 + 74, GY - 28);

            // couple
            drawCouple();

            // petals
            for (var i = 0; i < petals.length; i++) {
                var pt = petals[i];
                ctx.save(); ctx.translate(Math.floor(pt.x), Math.floor(pt.y)); ctx.rotate(pt.rot);
                px(-pt.sz / 2, -pt.sz / 2, pt.sz, pt.sz, pt.col);
                px(-pt.sz, 0, pt.sz, pt.sz, pt.col); px(0, -pt.sz, pt.sz, pt.sz, pt.col);
                ctx.restore();
            }
        }

        // ══════════════════════════════════════════════════════════════════════════
        // LOOP
        // ══════════════════════════════════════════════════════════════════════════
        var lastTs = 0;
        function loop(ts) {
            var dt = Math.min((ts - lastTs) / 1000, 0.05);
            lastTs = ts;
            ctx.clearRect(0, 0, W, H);
            update(dt);
            drawScene();
            requestAnimationFrame(loop);
        }
        requestAnimationFrame(loop);

        function showVideo() {
            document.getElementById('video-overlay').classList.add('show');
            overlayStep = 0;
            updateOverlayPanels();
            var v = document.getElementById('story-video');
            v.play();
        }

        var overlayStep = 0;

        function handleContinue() {
            var v = document.getElementById('story-video');
            v.pause();
            overlayStep++;
            if (overlayStep === 1) {
                updateOverlayPanels();
            } else if (overlayStep === 2) {
                updateOverlayPanels();
            } else {
                goToGame();
            }
        }

        function updateOverlayPanels() {
            document.getElementById('panel-video').style.display = overlayStep === 0 ? 'block' : 'none';
            document.getElementById('panel-img1').style.display  = overlayStep === 1 ? 'block' : 'none';
            document.getElementById('panel-img2').style.display  = overlayStep === 2 ? 'block' : 'none';

            document.getElementById('vlab-top').textContent =
                overlayStep === 0 ? 'It was a beautiful spring day. As you can see your future is very bright!' :
                overlayStep === 1 ? 'Wonderful chicken isn\'t it? You are about to travel the world together as well. I wish you many forever love and happiness ahead!' :
                                    'But something is wrong, you hear a large caw caww sounds. A giant KFC bucket is coming get readyyyyyy! ';
            
            var btnLabel = overlayStep < 2 ? 'CONTINUE ▶' : 'FIGHT! ▶';
            document.getElementById('btn-continue').textContent = btnLabel;
        }

        function goToGame() { window.location.href = 'wall_of_kfc.html'; }
    </script>
</body>

</html>
