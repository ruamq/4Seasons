<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Turtle Guide</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
    }

    /* ── Stars ── */
    .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .star {
      position: absolute; background: #fff; border-radius: 50%;
      animation: twinkle var(--d) infinite alternate;
    }
    @keyframes twinkle { from{opacity:0.1} to{opacity:0.9} }

    /* ── Scene ── */
    .scene {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      flex: 1; width: 100%;
      padding-bottom: 200px;
    }

    /* ── Turtle ── */
    #turtle-canvas {
      image-rendering: pixelated; image-rendering: crisp-edges;
      filter: drop-shadow(0 0 18px #3ddc84aa);
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
    #turtle-canvas.bounce { animation: speak-bounce 0.22s ease; }
    @keyframes speak-bounce { 0%{transform:scale(1)} 40%{transform:translateY(-6px) scale(1.06)} 100%{transform:scale(1)} }

    /* ── Hint ── */
    .hint { margin-top: 18px; color: #3ddc84; font-size: 8px; letter-spacing: 2px; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

    /* ── Ready button ── */
    .ready-btn {
      display: none; margin-top: 24px;
      background: #3ddc84; color: #0a0a0f; border: none;
      padding: 16px 36px; font-family: 'Press Start 2P', monospace;
      font-size: 12px; cursor: pointer; letter-spacing: 2px;
      box-shadow: 4px 4px 0 #1a8a4a, 8px 8px 0 #0d4a26;
      animation: btn-glow 1.5s ease-in-out infinite alternate;
    }
    .ready-btn:hover  { filter: brightness(1.15); }
    .ready-btn:active { transform: translate(2px,2px); }
    @keyframes btn-glow {
      from { box-shadow: 4px 4px 0 #1a8a4a, 8px 8px 0 #0d4a26, 0 0 12px #3ddc8466; }
      to   { box-shadow: 4px 4px 0 #1a8a4a, 8px 8px 0 #0d4a26, 0 0 28px #3ddc84cc; }
    }

    /* ── Dialog box ── */
    .dialog-box {
      position: fixed; bottom: 0; left: 0; right: 0; height: 180px;
      background: #0d1b12; border-top: 4px solid #3ddc84;
      box-shadow: 0 -4px 0 #1a4a2a, inset 0 2px 0 #1f3a2a;
      padding: 24px 36px; z-index: 10;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
    }
    .dialog-text-wrap { flex: 1; overflow: hidden; position: relative; }
    .dialog-text { color: #e8ffe8; font-size: 13px; line-height: 2; letter-spacing: 0.5px; white-space: pre-wrap; }
    .dialog-text::after { content: '▮'; color: #3ddc84; animation: blink-c 0.7s step-end infinite; }
    .dialog-text.done::after { display: none; }
    @keyframes blink-c { 0%,100%{opacity:1} 50%{opacity:0} }
    .next-arrow { color: #3ddc84; font-size: 16px; align-self: flex-end; padding-bottom: 4px; display: none; animation: arr 0.6s ease-in-out infinite alternate; }
    .next-arrow.visible { display: block; }
    @keyframes arr { from{transform:translateY(0)} to{transform:translateY(6px)} }
    .msg-counter { position: absolute; top: 10px; right: 36px; color: #3ddc84; font-size: 8px; opacity: 0.4; }

    /* ── Item overlay ── */
    .item-overlay, .acquired-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.88); z-index: 50;
      align-items: center; justify-content: center;
    }
    .item-overlay.show, .acquired-overlay.show { display: flex; }

    .item-box {
      background: #0d1b12; border: 4px solid #3ddc84;
      box-shadow: 0 0 0 4px #0a0a0f, 0 0 40px #3ddc8455;
      padding: 36px 48px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      animation: pop-in 0.18s ease;
    }
    @keyframes pop-in { from{transform:scale(0.8);opacity:0} to{transform:scale(1);opacity:1} }
    .item-label { color: #3ddc84; font-size: 9px; letter-spacing: 3px; opacity: 0.65; }
    .item-name  { color: #e8ffe8; font-size: 16px; letter-spacing: 2px; text-shadow: 0 0 12px #3ddc84; }
    .item-desc  { color: #3ddc84; font-size: 8px; opacity: 0.65; }
    #glider-canvas, #glider-canvas-2 { image-rendering: pixelated; }

    .accept-btn {
      margin-top: 8px; background: #3ddc84; color: #0a0a0f; border: none;
      padding: 14px 32px; font-family: 'Press Start 2P', monospace;
      font-size: 11px; cursor: pointer; letter-spacing: 2px;
      box-shadow: 3px 3px 0 #1a8a4a, 6px 6px 0 #0d4a26;
    }
    .accept-btn:hover  { filter: brightness(1.15); }
    .accept-btn:active { transform: translate(2px,2px); }

    /* ── Acquired overlay ── */
    .acquired-box {
      background: #0d1b12; border: 4px solid #ffd700;
      box-shadow: 0 0 0 4px #0a0a0f, 0 0 50px #ffd70055;
      padding: 48px 60px;
      display: flex; flex-direction: column; align-items: center; gap: 20px;
      animation: pop-in 0.18s ease; cursor: pointer;
    }
    .acquired-text {
      color: #ffd700; font-size: 18px; line-height: 2.2;
      letter-spacing: 2px; text-align: center;
      animation: gold-pulse 1s ease-in-out infinite alternate;
    }
    @keyframes gold-pulse {
      from { text-shadow: 0 0 8px #ffd700aa; }
      to   { text-shadow: 0 0 30px #ffd700, 0 0 60px #ffd70066; }
    }
    .acquired-sub { color: #3ddc84; font-size: 8px; opacity: 0.6; animation: pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>

  <div class="stars" id="stars"></div>

  <div class="scene">
    <canvas id="turtle-canvas"></canvas>
    <div class="hint" id="hint">CLICK TO CONTINUE</div>
    <button class="ready-btn" id="ready-btn" onclick="window.location.href='summer.html'">
      I AM READY ▶
    </button>
  </div>

  <!-- Dialog box -->
  <div class="dialog-box" id="dialog-box">
    <div class="dialog-text-wrap">
      <div class="dialog-text" id="dialog-text"></div>
    </div>
    <div class="next-arrow" id="next-arrow">▼</div>
    <div class="msg-counter" id="msg-counter"></div>
  </div>

  <!-- Sky Glider item screen -->
  <div class="item-overlay" id="item-overlay">
    <div class="item-box">
      <div class="item-label">TURTLE PRESENTS</div>
      <canvas id="glider-canvas"></canvas>
      <div class="item-name">SKY GLIDER</div>
      <div class="item-desc">Soar above the summer winds.</div>
      <button class="accept-btn" id="accept-btn">ACCEPT</button>
    </div>
  </div>

  <!-- Acquired screen -->
  <div class="acquired-overlay" id="acquired-overlay">
    <div class="acquired-box" id="acquired-box">
      <canvas id="glider-canvas-2"></canvas>
      <div class="acquired-text">SKY GLIDER<br>ACQUIRED!</div>
      <div class="acquired-sub">CLICK TO CONTINUE</div>
    </div>
  </div>

  <script>

    /* ═══════════════════════════════════════════════════════
       ██  MESSAGE LIST — ADD YOUR MESSAGES HERE  ██
       Simply add or remove strings. Use \n for line breaks.
       The last message leads into the sky glider item event.
    ═══════════════════════════════════════════════════════ */
    const MESSAGES = [
      "Hey there, traveller!\nWelcome to my little corner of the world.",
      "I'm Shellsworth, your pixel turtle guide.\nI've been waiting for you.",
      "There's a magical place called Summer\njust beyond this screen...",
      "But first, let me tell you a few things\nabout what lies ahead.",
      "The sun is warm, the waters are cool,\nand the vibes? Absolutely immaculate.",
      "You'll need courage, curiosity,\nand maybe some sunscreen.",
      "Oh — and one more thing.\nYou're going to need this.",
    ];
    /* ═══════════════════════════════════════════════════════
       ██  END OF MESSAGE LIST  ██
    ═══════════════════════════════════════════════════════ */


    // ── Stars ─────────────────────────────────────────────
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const sz = Math.random() * 2.5 + 0.5;
      s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*3+1).toFixed(1)}s;animation-delay:${(Math.random()*3).toFixed(1)}s`;
      starsEl.appendChild(s);
    }


    // ── Turtle ────────────────────────────────────────────
    const canvas = document.getElementById('turtle-canvas');
    const ctx    = canvas.getContext('2d');
    const U      = 8;
    canvas.width  = 32 * U;
    canvas.height = 20 * U;

    function r(x, y, w, h, c) {
      ctx.fillStyle = c;
      ctx.fillRect(x*U, y*U, w*U, h*U);
    }
    const C = {
      ol:'#152b0a', sd:'#2b6618', sm:'#3d8c22', sl:'#57b830', sh:'#7cd444',
      kd:'#2e5c10', km:'#498c1c', kl:'#6ab42c', ey:'#0a0a0a',
      bl:'#b8dc80', bm:'#9cc060',
    };

    function drawTurtle(talking) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // tail
      r(2,10,3,2,C.kd); r(2,10,2,2,C.km); r(1,11,2,1,C.kd);
      // shell
      r(4,3,17,12,C.ol); r(5,4,15,10,C.sd); r(6,4,13,9,C.sm);
      r(7,5,10,7,C.sl);  r(8,5,7,5,C.sh);
      r(7,5,1,7,C.ol); r(13,5,1,7,C.ol); r(7,8,10,1,C.ol); r(8,5,3,2,C.sh);
      // belly
      r(5,13,15,2,C.bl); r(6,14,13,1,C.bm);
      // front leg
      r(18,12,3,4,C.kd); r(18,12,2,4,C.km); r(19,12,1,3,C.kl);
      r(17,15,4,1,C.kd); r(18,16,3,1,C.ol);
      // back leg
      r(5,12,3,4,C.kd); r(5,12,2,4,C.km); r(6,12,1,3,C.kl);
      r(4,15,4,1,C.kd); r(4,16,4,1,C.ol);
      // neck
      r(20,8,3,4,C.kd); r(20,8,2,4,C.km); r(21,9,1,2,C.kl);
      // head
      r(21,5,9,7,C.ol);
      r(22,6,7,5,C.kd); r(22,6,6,5,C.km); r(23,6,4,4,C.kl);
      r(24,6,2,2,C.ey); r(24,6,1,1,C.km); r(29,8,1,1,C.ol);
      // mouth
      if (talking) { r(28,9,2,1,C.ol); r(27,10,3,1,C.ol); }
      else         { r(27,10,3,1,C.ol); }
    }

    let blinkInterval;
    function startIdleBlink() {
      clearInterval(blinkInterval);
      blinkInterval = setInterval(() => {
        ctx.fillStyle = C.km;
        ctx.fillRect(24*U, 6*U, 2*U, 2*U);
        setTimeout(() => drawTurtle(false), 100);
      }, 2800 + Math.random() * 2000);
    }
    function turtleTalk() {
      canvas.classList.remove('bounce');
      void canvas.offsetWidth;
      canvas.classList.add('bounce');
      clearInterval(blinkInterval);
      drawTurtle(true);
      setTimeout(() => drawTurtle(false), 150);
      setTimeout(() => drawTurtle(true),  300);
      setTimeout(() => drawTurtle(false), 450);
      setTimeout(() => { drawTurtle(false); startIdleBlink(); }, 500);
    }
    drawTurtle(false);
    startIdleBlink();


    // ── Sky Glider pixel art ──────────────────────────────
    function drawGlider(el) {
      const g = el.getContext('2d');
      const S = 8;
      el.width  = 20 * S;
      el.height = 12 * S;
      function p(x,y,w,h,c){ g.fillStyle=c; g.fillRect(x*S,y*S,w*S,h*S); }
      const gc = {
        ol:'#1a2a3a', fr:'#2a4a6a', bd:'#4a8ab8',
        wg:'#a8d4f8', wh:'#d8eeff', ac:'#ffd700', rd:'#e84040',
      };
      // left wing outline + fill
      p(0,4,7,2,gc.ol); p(1,4,5,1,gc.wh); p(1,5,5,1,gc.wg);
      // right wing outline + fill
      p(13,4,7,2,gc.ol); p(14,4,5,1,gc.wh); p(14,5,5,1,gc.wg);
      // fuselage outline
      p(7,1,6,1,gc.ol); p(6,2,8,6,gc.ol);
      // fuselage fill
      p(7,2,6,5,gc.fr); p(7,2,6,4,gc.bd); p(8,2,4,2,gc.wh); p(9,2,2,1,'#ffffff');
      // nose
      p(8,1,4,1,gc.rd); p(9,0,2,1,gc.rd);
      // gold stripe
      p(7,5,6,1,gc.ac);
      // tail fins
      p(7,7,2,2,gc.ol); p(7,7,1,2,gc.fr);
      p(11,7,2,2,gc.ol); p(12,7,1,2,gc.fr);
      // rear stabilizer
      p(5,8,10,1,gc.ol); p(6,8,8,1,gc.bd);
    }
    drawGlider(document.getElementById('glider-canvas'));
    drawGlider(document.getElementById('glider-canvas-2'));


    // ── DOM refs ──────────────────────────────────────────
    const dialogBox       = document.getElementById('dialog-box');
    const dialogText      = document.getElementById('dialog-text');
    const nextArrow       = document.getElementById('next-arrow');
    const msgCounter      = document.getElementById('msg-counter');
    const hint            = document.getElementById('hint');
    const readyBtn        = document.getElementById('ready-btn');
    const itemOverlay     = document.getElementById('item-overlay');
    const acquiredOverlay = document.getElementById('acquired-overlay');
    const acceptBtn       = document.getElementById('accept-btn');
    const acquiredBox     = document.getElementById('acquired-box');


    // ── Item / Acquired flow ──────────────────────────────
    function showGliderItem() {
      hint.style.display      = 'none';
      dialogBox.style.display = 'none';
      itemOverlay.classList.add('show');
    }

    acceptBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      itemOverlay.classList.remove('show');
      acquiredOverlay.classList.add('show');
    });

    acquiredBox.addEventListener('click', (e) => {
      e.stopPropagation();
      acquiredOverlay.classList.remove('show');
      dialogBox.style.display = 'flex';
      turtleTalk();
      isAcquiredMsg = true;
      typeMessage("SKY GLIDER acquired!\nNow you are truly ready.");
    });


    // ── Typewriter ────────────────────────────────────────
    let msgIndex      = 0;
    let typing        = false;
    let typeTimeout   = null;
    let currentFull   = '';
    let charIndex     = 0;
    let isAcquiredMsg = false;

    function updateCounter() {
      msgCounter.textContent = `${msgIndex + 1} / ${MESSAGES.length}`;
    }

    function onTypingDone() {
      typing = false;
      dialogText.classList.add('done');
      if (isAcquiredMsg) {
        isAcquiredMsg = false;
        readyBtn.style.display = 'block';
      } else if (msgIndex < MESSAGES.length - 1) {
        nextArrow.classList.add('visible');
      } else {
        nextArrow.classList.remove('visible');
        hint.style.display = 'none';
        setTimeout(showGliderItem, 600);
      }
    }

    function typeMessage(text) {
      dialogText.classList.remove('done');
      nextArrow.classList.remove('visible');
      currentFull = text; charIndex = 0; typing = true;
      dialogText.textContent = '';
      function tick() {
        if (charIndex < currentFull.length) {
          dialogText.textContent = currentFull.slice(0, ++charIndex);
          typeTimeout = setTimeout(tick, 34);
        } else {
          onTypingDone();
        }
      }
      tick();
    }

    function skipToEnd() {
      clearTimeout(typeTimeout);
      dialogText.textContent = currentFull;
      onTypingDone();
    }

    function advance() {
      if (typing) { skipToEnd(); return; }
      if (isAcquiredMsg) return;
      if (msgIndex >= MESSAGES.length - 1) return;
      msgIndex++;
      updateCounter();
      turtleTalk();
      typeMessage(MESSAGES[msgIndex]);
    }

    // Start
    updateCounter();
    turtleTalk();
    typeMessage(MESSAGES[0]);

    // Global click
    document.body.addEventListener('click', (e) => {
      if (itemOverlay.classList.contains('show'))     return;
      if (acquiredOverlay.classList.contains('show')) return;
      if (e.target === readyBtn)  return;
      if (e.target === acceptBtn) return;
      advance();
    });

  </script>
</body>
</html>
